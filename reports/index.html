<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 美股持仓日报 — 报告总览</title>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-card: #1a1d27;
    --bg-card-hover: #212433;
    --border: #2a2d3a;
    --text-primary: #e8eaed;
    --text-secondary: #9aa0a6;
    --text-muted: #5f656b;
    --green: #34d399;
    --red: #f87171;
    --green-bg: rgba(52,211,153,0.1);
    --red-bg: rgba(248,113,113,0.1);
    --accent: #60a5fa;
    --accent-bg: rgba(96,165,250,0.1);
    --gold: #fbbf24;
    --radius: 12px;
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
  }

  .top-nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 10px 20px;
    display: flex; justify-content: center; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .top-nav .nav-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg-card); color: var(--text-secondary); text-decoration: none;
    font-size: 13px; font-weight: 500; transition: all var(--transition);
  }
  .top-nav .nav-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: var(--accent); }
  .top-nav .nav-pill {
    padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
    text-decoration: none; background: rgba(251,191,36,0.12); color: var(--gold); transition: all var(--transition);
  }
  .top-nav .nav-pill:hover { background: var(--gold); color: #0f1117; }

  .container { max-width: 800px; margin: 0 auto; padding: 32px 20px 80px; }

  .page-header { text-align: center; padding: 40px 0 32px; }
  .page-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .page-header .subtitle { font-size: 14px; color: var(--text-secondary); }

  /* Stats Summary */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 36px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
  .stat-card .stat-value { font-size: 32px; font-weight: 700; }
  .stat-card .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

  /* Report List */
  .report-list { display: flex; flex-direction: column; gap: 12px; }
  .report-row {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;
    text-decoration: none; color: var(--text-primary); transition: all var(--transition);
  }
  .report-row:hover { border-color: var(--accent); background: var(--bg-card-hover); }
  .report-row .report-date { font-size: 16px; font-weight: 600; }
  .report-row .report-day { font-size: 13px; color: var(--text-secondary); }
  .report-row .report-meta { display: flex; align-items: center; gap: 12px; }
  .report-row .report-tag {
    display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
  }
  .tag-high { background: var(--green-bg); color: var(--green); }
  .tag-medium { background: rgba(251,191,36,0.1); color: var(--gold); }
  .report-row .report-movement { font-size: 14px; font-weight: 600; }
  .movement-up { color: var(--green); }
  .movement-down { color: var(--red); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }

  .footer { text-align: center; margin-top: 48px; font-size: 12px; color: var(--text-muted); }

  @media (max-width: 640px) {
    .container { padding: 20px 16px 60px; }
    .report-row { flex-direction: column; align-items: flex-start; gap: 8px; }
  }
</style>
</head>
<body>

<nav class="top-nav">
  <a href="../config/manage.html" class="nav-pill">⚙️ 持仓管理</a>
  <span style="color:var(--text-secondary);font-size:13px;">报告总览</span>
  <a href="report_2026-06-25_final.html" class="nav-btn">📄 最新报告</a>
</nav>

<div class="container">

  <header class="page-header">
    <h1>📊 报告总览</h1>
    <div class="subtitle">AI US Stock Monitor · 历史日报一览</div>
  </header>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" style="color:var(--accent);">1</div>
      <div class="stat-label">已生成报告</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--green);">HIGH</div>
      <div class="stat-label">最新置信度</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--gold);">2</div>
      <div class="stat-label">平均校验轮次</div>
    </div>
  </div>

  <div class="report-list">
    <a href="report_2026-06-25_final.html" class="report-row">
      <div>
        <div class="report-date">2026年6月25日</div>
        <div class="report-day">周四 · NASDAQ -0.46% · 8只持仓全线分析</div>
      </div>
      <div class="report-meta">
        <span class="report-tag tag-high">HIGH</span>
        <span class="report-movement movement-down">大盘 ▼</span>
      </div>
    </a>
  </div>

  <div class="footer">
    AI US Stock Monitor · 每日 06:30 自动生成 · 新报告将自动出现在此列表
  </div>

</div>
</body>
</html>
